<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="icon" type="png" href="./assets/github-logo.png">
<!-- fond geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- talwing & daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     
</head>

<body class="bg-gray-100 pt-10 pb-20">
    <!-- navebar -->
    <section>
        <div class="navbar bg-white shadow">
            <div class="flex-1">
            <a class="btn btn-ghost text-xl"><img class="w-8" src="./assets/github-logo.png" alt="">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <label class=" input input-bordered w-24 md:w-auto">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text"  placeholder="Search Issue"/>
                </label>
                <button class="btn btn-primary">+ New Issue</button>
            </div>
        </div>
    </section>
<!-- Tabs -->
    <section class="bg-white shadow p-6 w-10/12 mx-auto m-7 rounded-lg flex gap-4">
        <button class="btn">All</button>
        <button class="btn">Open</button>
        <button class="btn">Closed</button>
    </section>

    <section>
        <div class="bg-white shadow p-6 w-10/12 mx-auto m-7 rounded-lg flex justify-between items-center gap-4">
           <div class="flex gap-3 items-center">
            <img class="bg-gray-200 rounded-full p-2" src="./assets/Aperture.png" alt="">
            <div>
                <h3 class="font-bold text-xl"><span>50</span> Issues</h3>
                <p>Track and manage your project issues</p>
            </div>
           </div>

           <div class="flex gap-5">
            <p class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-700 rounded-full"></span>Open</p>
            <p class="flex items-center gap-2">
                <span class="w-3 h-3 bg-purple-700 rounded-full"></span>Closed</p>
           </div>
        </div>>
            
    </section>
</body>
</html>
